<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        let stored = '';
        try { stored = localStorage.getItem('scholaxis-theme') || ''; } catch {}
        const system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = stored === 'light' || stored === 'dark' ? stored : system;
      })();
    </script>
    <title>Scholaxis · 연구 탐색 홈</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body data-page="home">
    <div class="shell">
      <header class="topbar">
        <div class="topbar__inner">
          <a class="brand" href="./index.html" aria-label="Scholaxis 홈으로 이동">
            <span class="brand__mark" aria-hidden="true">
              <img src="./favicon.png" alt="" />
            </span>
            <span class="brand__copy">
              <strong>Scholaxis</strong>
              <small>Research discovery</small>
            </span>
          </a>
          <nav aria-label="주요 탐색">
            <a class="is-active" href="./index.html">탐색</a>
            <a href="./library.html">라이브러리</a>
            <a href="./auth.html">계정</a>
          </nav>
          <div class="topbar__actions">
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환">
              <span class="theme-toggle__icon" data-theme-toggle-icon aria-hidden="true">☾</span>
              <span data-theme-toggle-label>다크</span>
            </button>
          </div>
        </div>
      </header>

      <main class="page home-page page-minimal">
        <section class="minimal-hero" aria-labelledby="home-title">
          <div class="minimal-hero__copy">
            <span class="section-eyebrow">Research search</span>
            <h1 id="home-title">필요한 연구만 빠르게 찾으세요</h1>
            <p>논문, 특허, 과제 자료를 한 번에 탐색하고 필요한 순간에만 상세 분석으로 들어갑니다.</p>
          </div>

          <form class="search-box search-box--minimal" data-search-form>
            <label class="label" for="query">연구 주제</label>
            <div class="search-box__input-shell">
              <input
                class="input search-input"
                id="query"
                name="q"
                type="search"
                placeholder="예: AI 반도체 설계 자동화"
                autocomplete="off"
                autofocus
              />
              <button class="button button--primary button--large" type="submit">탐색</button>
            </div>

            <details class="advanced-options">
              <summary>고급 옵션</summary>
              <div class="home-filter-grid">
                <fieldset class="segmented-field">
                  <legend class="label">탐색 범위</legend>
                  <div class="segmented-control">
                    <label class="segmented-option">
                      <input type="radio" name="region" value="all" checked />
                      <span>전체</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="region" value="domestic" />
                      <span>국내</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="region" value="global" />
                      <span>해외</span>
                    </label>
                  </div>
                </fieldset>

                <fieldset class="segmented-field">
                  <legend class="label">자료 유형</legend>
                  <div class="segmented-control segmented-control--wide">
                    <label class="segmented-option">
                      <input type="radio" name="sourceType" value="all" checked />
                      <span>전체</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="sourceType" value="paper" />
                      <span>논문</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="sourceType" value="patent" />
                      <span>특허</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="sourceType" value="report" />
                      <span>보고서</span>
                    </label>
                  </div>
                </fieldset>

                <fieldset class="segmented-field">
                  <legend class="label">정렬</legend>
                  <div class="segmented-control">
                    <label class="segmented-option">
                      <input type="radio" name="sort" value="relevance" checked />
                      <span>추천순</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="sort" value="latest" />
                      <span>최신순</span>
                    </label>
                    <label class="segmented-option">
                      <input type="radio" name="sort" value="citation" />
                      <span>인용순</span>
                    </label>
                  </div>
                </fieldset>
              </div>
            </details>
          </form>

          <div class="quick-strip" aria-label="추천 검색어">
            <button class="suggestion-link" type="button" data-suggestion="AI 반도체 설계 자동화">AI 반도체</button>
            <button class="suggestion-link" type="button" data-suggestion="양자 암호화 국내 과제">양자 암호화</button>
            <button class="suggestion-link" type="button" data-suggestion="학생발명전 의료 AI 아이디어">의료 AI 발명</button>
            <a class="suggestion-link" href="./similarity.html">유사도 분석</a>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__inner footer-minimal">
          <strong>Scholaxis</strong>
          <p>검색, 상세 확인, 유사도 비교에 집중하는 연구 탐색 도구입니다.</p>
        </div>
      </footer>
    </div>
    <script type="module" src="./site.js"></script>
  </body>
</html>
