<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        let stored = '';
        try { stored = localStorage.getItem('scholaxis-theme') || ''; } catch {}
        const system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = stored === 'light' || stored === 'dark' ? stored : system;
      })();
    </script>
    <title>Scholaxis · 검색 결과</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="./favicon.png" />
    <link rel="apple-touch-icon" href="./favicon.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="results">
    <div class="shell">
      <header class="topbar">
        <div class="topbar__inner">
          <a class="brand" href="./index.html" aria-label="Scholaxis 홈으로 이동">
            <span class="brand__mark" aria-hidden="true">
              <img src="./favicon.png" alt="" />
            </span>
            <span class="brand__copy">
              <strong>Scholaxis</strong>
              <small>Research discovery</small>
            </span>
          </a>
          <nav aria-label="주요 탐색">
            <a class="is-active" href="./index.html">탐색</a>
            <a href="./library.html">라이브러리</a>
            <a href="./auth.html">계정</a>
          </nav>
          <div class="topbar__actions">
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환">
              <span class="theme-toggle__icon" data-theme-toggle-icon aria-hidden="true">☾</span>
              <span data-theme-toggle-label>다크</span>
            </button>
          </div>
        </div>
      </header>

      <main class="page results-page page-minimal">
        <section class="result-hero result-hero--compact">
          <span class="section-eyebrow">Search</span>
          <h1 class="loading-copy loading-copy--title" data-query-label>검색 결과</h1>
          <p class="loading-copy" data-results-summary>관련 문헌을 찾고 있습니다.</p>
          <p class="live-status live-status--loading" data-search-progress aria-live="polite">검색을 준비하고 있습니다.</p>

          <form class="inline-search inline-search--minimal" data-inline-search>
            <input id="search-inline" name="q" type="search" placeholder="키워드 또는 자연어 질문" />
            <button class="button button--primary" type="submit">다시 검색</button>

            <details class="advanced-options advanced-options--inline">
              <summary>필터</summary>
              <div class="compact-form-grid compact-form-grid--filters">
                <label>
                  <span class="label">지역</span>
                  <select class="select" id="region-inline" name="region">
                    <option value="all">전체</option>
                    <option value="domestic">국내</option>
                    <option value="global">해외</option>
                  </select>
                </label>
                <label>
                  <span class="label">유형</span>
                  <select class="select" id="type-inline" name="sourceType">
                    <option value="all">전체</option>
                    <option value="paper">논문</option>
                    <option value="patent">특허</option>
                    <option value="report">보고서</option>
                  </select>
                </label>
                <label>
                  <span class="label">정렬</span>
                  <select class="select" name="sort">
                    <option value="relevance">추천순</option>
                    <option value="latest">최신순</option>
                    <option value="citation">인용순</option>
                  </select>
                </label>
              </div>
              <div class="filter-source-status">
                <strong>활성 소스</strong>
                <ul data-source-list></ul>
              </div>
            </details>
          </form>

          <div class="result-utility-row">
            <span class="pill" data-results-count>0개 결과</span>
            <a class="pill pill--muted" href="./similarity.html">유사도 분석</a>
          </div>
          <div class="chip-row chip-row--subtle" data-related-queries></div>
        </section>

        <section class="result-list result-list--minimal" data-results-root></section>
      </main>

      <footer class="footer">
        <div class="footer__inner footer-minimal">
          <strong>Scholaxis</strong>
          <p>검색, 상세 확인, 유사도 비교에 집중하는 연구 탐색 도구입니다.</p>
        </div>
      </footer>
    </div>
    <script type="module" src="./site.js"></script>
  </body>
</html>
