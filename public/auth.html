<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      (() => {
        let stored = '';
        try { stored = localStorage.getItem('scholaxis-theme') || ''; } catch {}
        const system = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = stored === 'light' || stored === 'dark' ? stored : system;
      })();
    </script>
    <title>Scholaxis · 계정</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="icon" type="image/png" href="./favicon.png" />
  </head>
  <body data-page="auth">
    <div class="shell">
      <header class="topbar">
        <div class="topbar__inner">
          <a class="brand" href="./index.html" aria-label="Scholaxis 홈으로 이동">
            <span class="brand__mark" aria-hidden="true">
              <img src="./favicon.png" alt="" />
            </span>
            <span class="brand__copy">
              <strong>Scholaxis</strong>
              <small>Research discovery</small>
            </span>
          </a>
          <nav aria-label="주요 탐색">
            <a href="./index.html">탐색</a>
            <a href="./library.html">라이브러리</a>
            <a class="is-active" href="./auth.html">계정</a>
          </nav>
          <div class="topbar__actions">
            <button class="theme-toggle" type="button" data-theme-toggle aria-label="테마 전환">
              <span class="theme-toggle__icon" data-theme-toggle-icon aria-hidden="true">☾</span>
              <span data-theme-toggle-label>다크</span>
            </button>
          </div>
        </div>
      </header>

      <main class="page auth-page page-minimal">
        <section class="auth-layout">
          <article class="hero__panel auth-panel auth-panel--intro">
            <span class="hero__eyebrow">Account</span>
            <h1>로그인 또는 회원가입</h1>
            <p>저장한 문헌과 추천을 계속 보려면 계정으로 로그인하세요.</p>
          </article>

          <article class="hero__panel auth-panel">
            <div class="section-header-inline">
              <div>
                <span class="section-eyebrow">Session</span>
                <h2>계정</h2>
              </div>
            </div>
            <div class="status-cluster status-cluster--compact">
              <div class="signal-loader" aria-hidden="true"><span></span><span></span><span></span></div>
              <div class="account-summary" data-auth-session-summary>세션 상태를 확인하는 중입니다…</div>
            </div>
            <div class="auth-tabs" role="tablist" aria-label="인증 모드">
              <button class="pill is-active" type="button" role="tab" aria-selected="true" data-auth-tab="login">로그인</button>
              <button class="pill" type="button" role="tab" aria-selected="false" data-auth-tab="register">회원가입</button>
            </div>
            <form class="stack auth-form" data-auth-page-form>
              <input type="hidden" name="mode" value="login" />
              <label>
                이메일
                <input class="input" name="email" type="email" autocomplete="email" placeholder="example@school.ac.kr" required />
              </label>
              <label>
                비밀번호
                <input class="input" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required />
              </label>
              <label data-auth-display-name hidden>
                표시 이름
                <input class="input" name="displayName" autocomplete="nickname" placeholder="예: 김준서" />
              </label>
              <div class="action-row">
                <button class="button button--primary" type="submit" data-auth-submit>로그인</button>
                <button class="button button--ghost" type="button" data-auth-page-logout hidden>로그아웃</button>
              </div>
              <a class="subtle-link" href="./library.html">라이브러리로 돌아가기</a>
              <p class="auth-feedback muted-copy" data-auth-feedback>로그인 후 라이브러리와 추천을 이용할 수 있습니다.</p>
            </form>
            <div class="auth-session-card" data-auth-session-card></div>
          </article>
        </section>
      </main>

      <footer class="footer">
        <div class="footer__inner footer-minimal">
          <strong>Scholaxis</strong>
          <p>검색, 상세 확인, 유사도 비교에 집중하는 연구 탐색 도구입니다.</p>
        </div>
      </footer>
    </div>
    <script type="module" src="./site.js"></script>
  </body>
</html>
