<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Scholaxis architecture overview</title>
  <desc id="desc">A high-level diagram showing frontend, API, search core, source adapters, similarity pipeline, persistence, and runtime helper services.</desc>
  <rect width="1200" height="760" rx="28" fill="#0B1020"/>
  <rect x="28" y="28" width="1144" height="704" rx="24" fill="#11182D" stroke="#334155"/>
  <text x="60" y="78" fill="#E2E8F0" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">Scholaxis Architecture Overview</text>
  <text x="60" y="112" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Korean-first research exploration engine · single-origin web app</text>

  <rect x="60" y="150" width="290" height="120" rx="20" fill="#1D4ED8" opacity="0.95"/>
  <text x="88" y="196" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Frontend</text>
  <text x="88" y="228" fill="#DBEAFE" font-size="18" font-family="Arial, Helvetica, sans-serif">index / results / detail /</text>
  <text x="88" y="252" fill="#DBEAFE" font-size="18" font-family="Arial, Helvetica, sans-serif">similarity / library / admin</text>

  <rect x="455" y="150" width="290" height="120" rx="20" fill="#0F766E" opacity="0.98"/>
  <text x="485" y="196" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">API / BFF</text>
  <text x="485" y="228" fill="#CCFBF1" font-size="18" font-family="Arial, Helvetica, sans-serif">src/server.mjs</text>
  <text x="485" y="252" fill="#CCFBF1" font-size="18" font-family="Arial, Helvetica, sans-serif">same-origin /api/*</text>

  <rect x="850" y="150" width="290" height="120" rx="20" fill="#7C3AED" opacity="0.98"/>
  <text x="880" y="196" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Source Adapters</text>
  <text x="880" y="228" fill="#EDE9FE" font-size="18" font-family="Arial, Helvetica, sans-serif">Semantic Scholar / RISS /</text>
  <text x="880" y="252" fill="#EDE9FE" font-size="18" font-family="Arial, Helvetica, sans-serif">KCI / ScienceON / KIPRIS / R&amp;E</text>

  <rect x="320" y="340" width="560" height="150" rx="22" fill="#1E293B" stroke="#475569"/>
  <text x="355" y="390" fill="#F8FAFC" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">Search Core</text>
  <text x="355" y="424" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">query routing · deduplication · vector + sparse ranking</text>
  <text x="355" y="450" fill="#CBD5E1" font-size="18" font-family="Arial, Helvetica, sans-serif">translation-assisted retrieval · reranker · graph/recommendation explanation</text>
  <text x="355" y="476" fill="#93C5FD" font-size="17" font-family="Arial, Helvetica, sans-serif">src/search-service.mjs · src/dedup-service.mjs · src/vector-service.mjs</text>

  <rect x="60" y="560" width="330" height="118" rx="20" fill="#92400E" opacity="0.96"/>
  <text x="90" y="606" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Similarity Pipeline</text>
  <text x="90" y="638" fill="#FEF3C7" font-size="18" font-family="Arial, Helvetica, sans-serif">PDF / DOCX / HWPX / OCR fallback</text>
  <text x="90" y="662" fill="#FEF3C7" font-size="18" font-family="Arial, Helvetica, sans-serif">src/similarity-service.mjs</text>

  <rect x="435" y="560" width="330" height="118" rx="20" fill="#065F46" opacity="0.96"/>
  <text x="465" y="606" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Persistence</text>
  <text x="465" y="638" fill="#D1FAE5" font-size="18" font-family="Arial, Helvetica, sans-serif">SQLite default · PostgreSQL + pgvector</text>
  <text x="465" y="662" fill="#D1FAE5" font-size="18" font-family="Arial, Helvetica, sans-serif">documents / sessions / library / saved searches</text>

  <rect x="810" y="560" width="330" height="118" rx="20" fill="#9A3412" opacity="0.96"/>
  <text x="840" y="606" fill="white" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Runtime Helpers</text>
  <text x="840" y="638" fill="#FFEDD5" font-size="18" font-family="Arial, Helvetica, sans-serif">translation / reranker / vector / graph</text>
  <text x="840" y="662" fill="#FFEDD5" font-size="18" font-family="Arial, Helvetica, sans-serif">scheduler / worker / ops scripts</text>

  <path d="M350 210H455" stroke="#93C5FD" stroke-width="6" stroke-linecap="round"/>
  <path d="M745 210H850" stroke="#C4B5FD" stroke-width="6" stroke-linecap="round"/>
  <path d="M600 270V340" stroke="#5EEAD4" stroke-width="6" stroke-linecap="round"/>
  <path d="M320 410H150C120 410 100 430 100 460V560" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 490V560" stroke="#86EFAC" stroke-width="5" stroke-linecap="round"/>
  <path d="M880 410H1080C1110 410 1120 430 1120 460V560" stroke="#FDBA74" stroke-width="5" stroke-linecap="round"/>
</svg>
